version: '3.8'

services:
  career-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: career-oracle-engine:latest
    container_name: career-engine
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - CAREERS_JSON_PATH=./data/careers.json
      - LOG_LEVEL=info
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    mem_limit: 256m
    cpu_shares: 512
