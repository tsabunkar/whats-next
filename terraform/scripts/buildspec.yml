version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY
  build:
    commands:
      - echo "Pulling image from Docker Hub: $DOCKER_HUB_REPO:$TAG"
      - docker pull $DOCKER_HUB_REPO:$TAG
      - echo "Tagging for ECR..."
      - docker tag $DOCKER_HUB_REPO:$TAG $ECR_REPOSITORY:$TAG
      - docker tag $DOCKER_HUB_REPO:$TAG $ECR_REPOSITORY:latest
      - echo "Pushing to ECR..."
      - docker push $ECR_REPOSITORY:$TAG
      - docker push $ECR_REPOSITORY:latest
  post_build:
    commands:
      - echo "Updating Lambda function..."
      - aws lambda update-function-code --function-name $LAMBDA_FUNCTION --image-uri $ECR_REPOSITORY:$TAG --publish --region $AWS_REGION
      - echo "Sync complete for tag: $TAG"
